<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Timer Pro | AI Integrated</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="logo">RANDOM TIMER</h1>
        <div id="monthBadge" class="badge">...</div>
    </header>

    <main class="timer-container">
        <div class="clock-wrap">
            <svg viewBox="0 0 100 100">
                <circle class="track" cx="50" cy="50" r="44"/>
                <circle id="progressRing" class="progress" cx="50" cy="50" r="44"/>
            </svg>
            <div class="time-display">
                <div id="digits" class="digits">00:00:00</div>
                <div class="label">REMAINING</div>
            </div>
        </div>

        <div id="status" class="status-pill">IDLE</div>
        <p id="chosenLabel" class="ai-info">&nbsp;</p>

        <div class="controls">
            <button id="startBtn" class="btn-primary">▶ START</button>
            <button id="resetBtn" class="btn-secondary">↺ RESET</button>
        </div>
    </main>

    <section class="history-container">
        <h3>Session History</h3>
        <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead>
                <tr>
                    <th style="text-align:left;">Date</th>
                    <th>T1</th><th>T2</th><th>T3</th><th>T4</th>
                    <th>Daily Total</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
        <div style="margin-top: 20px; text-align: center;">
            <button id="testBtn" style="background: #444; color: #fff; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-right: 10px;">⏱ 10s Test</button>
            <button id="clearBtn" style="background: #8a2be2; color: #fff; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">🗑 Clear Test History</button>
        </div>

        <details style="margin-top: 20px;">
            <summary style="cursor: pointer; color: #adbac7; font-size: 0.9rem;">Show Test History</summary>
            <table style="width: 100%; border-collapse: collapse; margin-top: 10px; opacity: 0.7;">
                <thead>
                    <tr>
                        <th style="text-align:left;">Date</th>
                        <th>T1</th><th>T2</th><th>T3</th><th>T4</th>
                        <th>Daily Total</th>
                    </tr>
                </thead>
                <tbody id="testHistoryBody"></tbody>
            </table>
        </details>
    </section>

    <!-- Project logic bundled as a module -->
    <script type="module" src="js/timer.js?v=3"></script>
</body>
</html>
